# ===================================
# APPLICATION CONFIGURATION
# ===================================

server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# ===================================
# DATABASE CONFIGURATION
# ===================================


spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager_db
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================
# JPA / HIBERNATE CONFIGURATION
# ===================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================
# JWT CONFIGURATION
# ===================================

jwt.secret=${JWT_SECRET:MiClaveSecretaSuperSeguraParaJWTQueDebeSerLargaAlMenos256Bits2024TaskManager}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===================================
# EMAIL CONFIGURATION (SMTP Gmail)
# ===================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tucorreo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Diagnóstico (Railway: MAIL_DEBUG=true temporalmente)
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
# Confía en el certificado del servidor SMTP (útil en algunos despliegues)
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ===================================
# APP CONFIGURATION
# ===================================

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.name=Task Manager

# ===================================
# RATE LIMITING CONFIGURATION
# ===================================

rate-limit.auth.requests-per-minute=10
rate-limit.reset.requests-per-hour=3

# ===================================
# SECURITY CONFIGURATION
# ===================================

security.max-login-attempts=5
security.lockout-duration-minutes=15

# ===================================
# LOGGING CONFIGURATION
# ===================================

logging.level.org.springframework.web=INFO
logging.level.com.taskmanager=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===================================
# CORS CONFIGURATION
# ===================================

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
