# ===================================
# APPLICATION CONFIGURATION
# ===================================

server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# ===================================
# DATABASE CONFIGURATION
# ===================================

# Local: JDBC directo. Railway: DATABASE_URL postgresql://... se convierte a JDBC en RailwayDatabaseUrlEnvironmentPostProcessor
spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager_db
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================
# JPA / HIBERNATE CONFIGURATION
# ===================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================
# JWT CONFIGURATION
# ===================================

jwt.secret=${JWT_SECRET:MiClaveSecretaSuperSeguraParaJWTQueDebeSerLargaAlMenos256Bits2024TaskManager}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===================================
# LOGGING CONFIGURATION
# ===================================

logging.level.org.springframework.web=INFO
logging.level.com.taskmanager=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===================================
# CORS CONFIGURATION
# ===================================

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
