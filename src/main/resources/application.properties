# ===================================
# APPLICATION CONFIGURATION
# ===================================

server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# ===================================
# DATABASE CONFIGURATION
# ===================================


spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager_db
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================
# JPA / HIBERNATE CONFIGURATION
# ===================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================
# JWT CONFIGURATION
# ===================================

jwt.secret=${JWT_SECRET:MiClaveSecretaSuperSeguraParaJWTQueDebeSerLargaAlMenos256Bits2024TaskManager}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===================================
# APP CONFIGURATION
# ===================================

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.name=Task Manager

# ===================================
# EMAIL (SendGrid API HTTPS — compatible con Railway sin SMTP)
# ===================================
# SENDGRID_API_KEY: Settings → API Keys en https://app.sendgrid.com
# SENDGRID_FROM_EMAIL: misma dirección verificada en Single Sender Verification
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:}
sendgrid.from-name=${SENDGRID_FROM_NAME:${app.name}}

# ===================================
# RATE LIMITING CONFIGURATION
# ===================================

rate-limit.auth.requests-per-minute=10
rate-limit.reset.requests-per-hour=3

# ===================================
# SECURITY CONFIGURATION
# ===================================

security.max-login-attempts=5
security.lockout-duration-minutes=15

# ===================================
# LOGGING CONFIGURATION
# ===================================

logging.level.org.springframework.web=INFO
logging.level.com.taskmanager=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===================================
# CORS CONFIGURATION
# ===================================

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
