# ===================================
# PRODUCTION CONFIGURATION (Railway)
# ===================================

# SMTP: evita colgarse indefinidamente si el servidor de correo no responde
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.web=WARN
logging.level.com.taskmanager=INFO
logging.level.org.hibernate.SQL=WARN
